/* ─── AVATAR ─────────────────────────────────── */
const Avatar = ({ name, photoUrl, size = 36 }) => {
  const colors = ['#22D3A0','#38BDF8','#818CF8','#FBBF24','#F87171','#34D399'];
  const color = colors[name.charCodeAt(0) % colors.length];
  if (photoUrl) return <img src={photoUrl} alt={name} style={{ width: size, height: size, borderRadius: '50%', objectFit: 'cover', display: 'block' }} />;
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: `${color}22`, border: `1.5px solid ${color}55`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: size * 0.38, color: color, flexShrink: 0, fontFamily: 'Inter' }}>
      {name.charAt(0).toUpperCase()}
    </div>
  );
};

/* ─── STATUS BADGE ───────────────────────────── */
const Badge = ({ label, color = 'green', size = 'sm' }) => {
  const colors = {
    green:  { bg: 'rgba(34,211,160,0.1)',  text: '#22D3A0', dot: '#22D3A0' },
    gray:   { bg: 'rgba(255,255,255,0.06)', text: '#9CA3AF', dot: '#6B7280' },
    blue:   { bg: 'rgba(96,165,250,0.1)',  text: '#60A5FA', dot: '#60A5FA' },
    yellow: { bg: 'rgba(251,191,36,0.1)',  text: '#FBBF24', dot: '#F59E0B' },
    red:    { bg: 'rgba(248,113,113,0.1)', text: '#F87171', dot: '#F87171' },
  };
  const c = colors[color] || colors.green;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: c.bg, color: c.text, borderRadius: 20, padding: size === 'sm' ? '2px 8px' : '3px 10px', fontSize: size === 'sm' ? 11 : 12, fontWeight: 500 }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: c.dot, display: 'inline-block' }} />
      {label}
    </span>
  );
};

/* ─── SECTION LABEL ──────────────────────────── */
const SectionLabel = ({ children }) => (
  <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text3)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10, fontFamily: 'Barlow Condensed' }}>{children}</div>
);

/* ─── DARK BUTTON ────────────────────────────── */
const DarkBtn = ({ children, onClick, icon, variant = 'dark', small, danger, style: s = {} }) => {
  const [hov, setHov] = useState(false);
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: small ? '6px 12px' : '8px 16px',
    borderRadius: 7, border: 'none', cursor: 'pointer',
    fontSize: small ? 12 : 13, fontWeight: 500, transition: 'all 0.15s', ...s
  };
  const styles = {
    dark:    { background: hov ? '#22222C' : '#1A1A22', color: '#F0F0F0', border: '1px solid rgba(255,255,255,0.1)' },
    outline: { background: hov ? '#22222C' : 'transparent', color: '#9CA3AF', border: '1px solid rgba(255,255,255,0.12)' },
    ghost:   { background: hov ? '#22222C' : 'transparent', color: '#9CA3AF', border: '1px solid transparent' },
    accent:  { background: hov ? '#1BB88A' : '#22D3A0', color: '#0D0D0D', border: 'none' },
    danger:  { background: hov ? '#dc2626' : 'rgba(248,113,113,0.12)', color: '#F87171', border: '1px solid rgba(248,113,113,0.25)' },
  };
  const chosen = danger ? styles.danger : (styles[variant] || styles.dark);
  return (
    <button onClick={onClick} style={{ ...base, ...chosen }} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
      {icon && <Icon name={icon} size={13} color="currentColor" />}
      {children}
    </button>
  );
};

/* ─── CARD ───────────────────────────────────── */
const Card = ({ children, style: s = {}, noPad }) => (
  <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', padding: noPad ? 0 : 20, overflow: noPad ? 'hidden' : undefined, ...s }}>
    {children}
  </div>
);

/* ─── STAT CARD ──────────────────────────────── */
const StatCard = ({ icon, label, value, delta, color }) => (
  <Card style={{ flex: 1, minWidth: 160 }}>
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 14 }}>
      <div style={{ width: 36, height: 36, borderRadius: 8, background: `${color}18`, border: `1px solid ${color}30`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name={icon} size={16} color={color} />
      </div>
      <Badge label={`+${delta}%`} color="green" />
    </div>
    <div style={{ fontSize: 26, fontWeight: 700, color: 'var(--text)', lineHeight: 1, marginBottom: 4 }}>{typeof value === 'number' ? value.toLocaleString('pt-BR') : value}</div>
    <div style={{ fontSize: 12, color: 'var(--text2)' }}>{label}</div>
  </Card>
);

/* ═══════════════════════════════════════════════
   SVG BAR CHART
══════════════════════════════════════════════ */
const BarChartSVG = ({ data }) => {
  const [tooltip, setTooltip] = useState(null);
  const W = 540, H = 200, padL = 34, padR = 10, padT = 8, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const maxVal = Math.max(...data.flatMap(d => [d.visitas, d.cliques]));
  const barGroup = plotW / data.length;
  const barW = Math.min(18, barGroup * 0.32);
  const gap = 4;
  const yTicks = [0, 0.5, 1].map(t => Math.round(t * maxVal));
  const toY = v => padT + plotH - (v / maxVal) * plotH;
  const toXa = i => padL + i * barGroup + barGroup / 2 - barW - gap / 2;
  const toXb = i => padL + i * barGroup + barGroup / 2 + gap / 2;

  return (
    <div style={{ position: 'relative' }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block', overflow: 'visible' }}>
        {yTicks.map(t => <line key={t} x1={padL} x2={W - padR} y1={toY(t)} y2={toY(t)} stroke="rgba(255,255,255,0.06)" strokeWidth="1" />)}
        {yTicks.map(t => <text key={t} x={padL - 5} y={toY(t) + 4} textAnchor="end" fill="#6B7280" fontSize={10}>{t}</text>)}
        {data.map((d, i) => {
          const xa = toXa(i), xb = toXb(i);
          const ha = (d.visitas / maxVal) * plotH, hb = (d.cliques / maxVal) * plotH;
          const hov = tooltip?.i === i;
          return (
            <g key={i} onMouseEnter={() => setTooltip({ i, d })} onMouseLeave={() => setTooltip(null)} style={{ cursor: 'pointer' }}>
              <rect x={xa} y={toY(d.visitas)} width={barW} height={ha} rx={3} fill={hov ? '#38BDF8' : '#38BDF866'} style={{ transition: 'fill 0.15s' }} />
              <rect x={xb} y={toY(d.cliques)} width={barW} height={hb} rx={3} fill={hov ? '#22D3A0' : '#22D3A066'} style={{ transition: 'fill 0.15s' }} />
              <text x={padL + i * barGroup + barGroup / 2} y={H - 6} textAnchor="middle" fill="#6B7280" fontSize={10}>{d.day}</text>
            </g>
          );
        })}
        {tooltip && (() => {
          const { i, d } = tooltip;
          const tx = Math.min(toXa(i) - 4, W - 128);
          const ty = toY(Math.max(d.visitas, d.cliques)) - 56;
          return (
            <g>
              <rect x={tx} y={ty} width={120} height={48} rx={6} fill="#1A1A22" stroke="rgba(255,255,255,0.1)" strokeWidth="1" />
              <text x={tx + 10} y={ty + 16} fill="#F0F0F0" fontSize={11} fontWeight="600">{d.day}</text>
              <circle cx={tx + 14} cy={ty + 28} r={3} fill="#38BDF8" />
              <text x={tx + 22} y={ty + 32} fill="#9CA3AF" fontSize={10}>Visitas: {d.visitas}</text>
              <circle cx={tx + 14} cy={ty + 40} r={3} fill="#22D3A0" />
              <text x={tx + 22} y={ty + 44} fill="#9CA3AF" fontSize={10}>Cliques: {d.cliques}</text>
            </g>
          );
        })()}
      </svg>
      <div style={{ display: 'flex', gap: 16, marginTop: 4 }}>
        {[['#38BDF8','Visitas'],['#22D3A0','Cliques']].map(([c, l]) => (
          <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: 'var(--text2)' }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: c }} />{l}
          </div>
        ))}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════

══════════════════════════════════════════════ */
const PieChartSVG = ({ data }) => {
  const [hovered, setHovered] = useState(null);
  const cx = 80, cy = 80, r = 66, ri = 42;
  const total = data.reduce((s, d) => s + d.value, 0);
  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const sweep = (d.value / total) * Math.PI * 2;
    const a0 = angle, a1 = angle + sweep; angle = a1;
    const mid = (a0 + a1) / 2;
    const sc = hovered === i ? 1.06 : 1;
    const ox = (sc - 1) * Math.cos(mid) * r * 0.15;
    const oy = (sc - 1) * Math.sin(mid) * r * 0.15;
    const rx = cx + ox, ry = cy + oy;
    const x0 = rx + r * Math.cos(a0), y0 = ry + r * Math.sin(a0);
    const x1 = rx + r * Math.cos(a1), y1 = ry + r * Math.sin(a1);
    const ix0 = rx + ri * Math.cos(a0), iy0 = ry + ri * Math.sin(a0);
    const ix1 = rx + ri * Math.cos(a1), iy1 = ry + ri * Math.sin(a1);
    const large = sweep > Math.PI ? 1 : 0;
    const path = `M ${ix0} ${iy0} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} L ${ix1} ${iy1} A ${ri} ${ri} 0 ${large} 0 ${ix0} ${iy0} Z`;
    return { ...d, path, color: PIE_COLORS[i % PIE_COLORS.length], pct: Math.round(d.value / total * 100) };
  });
  const active = hovered !== null ? slices[hovered] : null;

  return (
    <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
      <svg viewBox="0 0 160 160" width={140} style={{ flexShrink: 0, overflow: 'visible' }}>
        {slices.map((s, i) => (
          <path key={i} d={s.path} fill={s.color}
            style={{ cursor: 'pointer', opacity: hovered !== null && hovered !== i ? 0.3 : 1, transition: 'opacity 0.2s' }}
            onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} />
        ))}
        <text x={cx} y={cy - 7} textAnchor="middle" fill="#F0F0F0" fontSize={18} fontWeight="700">{active ? active.pct + '%' : total}</text>
        <text x={cx} y={cy + 10} textAnchor="middle" fill="#6B7280" fontSize={9}>{active ? active.name : 'total'}</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flex: 1 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 12, opacity: hovered !== null && hovered !== i ? 0.35 : 1, transition: 'opacity 0.2s', cursor: 'pointer' }}
            onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color, flexShrink: 0 }} />
              <span style={{ color: 'var(--text2)' }}>{s.name}</span>
            </div>
            <span style={{ fontWeight: 600, color: 'var(--text)' }}>{s.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

          <h2 style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)' }}>{sellers.length} vendedor{sellers.length !== 1 ? 'es' : ''} cadastrado{sellers.length !== 1 ? 's' : ''}</h2>
        </div>
        <DarkBtn variant="accent" icon="plus" onClick={() => setModal('new')}>Novo Vendedor</DarkBtn>
      </div>

      {/* Table */}
      <Card noPad>
        {/* thead */}
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1.5fr 90px 80px 72px', gap: 0, padding: '10px 18px', borderBottom: '1px solid var(--border)', background: '#22222C' }}>
          {['Vendedor', 'WhatsApp', 'Cliques', 'Status', ''].map((h, i) => (
            <div key={i} style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', fontFamily: 'Barlow Condensed' }}>{h}</div>
          ))}
        </div>

        {sellers.map((seller, i) => (
          <div key={seller.id} style={{
            display: 'grid', gridTemplateColumns: '2fr 1.5fr 90px 80px 72px', gap: 0,
            alignItems: 'center', padding: '12px 18px',
            borderBottom: i < sellers.length - 1 ? '1px solid var(--border)' : 'none',
            background: 'transparent', transition: 'background 0.1s',
          }}
          onMouseEnter={e => e.currentTarget.style.background = '#22222C'}
          onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Avatar name={seller.name} photoUrl={seller.photoUrl} size={34} />
              <div>
                <div style={{ fontWeight: 500, fontSize: 13, color: 'var(--text)' }}>{seller.name}</div>
                <div style={{ fontSize: 11, color: 'var(--text3)' }}>ID #{seller.id}</div>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--text2)' }}>
              <Icon name="whatsapp" size={13} color="#22D3A0" />+{seller.whatsapp}
            </div>
            <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text)' }}>{seller.clicks.toLocaleString('pt-BR')}</div>
            <div><Badge label={seller.active ? 'Ativo' : 'Inativo'} color={seller.active ? 'green' : 'gray'} /></div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => setModal(seller)} title="Editar" style={{ width: 30, height: 30, borderRadius: 6, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text3)', transition: 'all 0.15s' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(56,189,248,0.1)'; e.currentTarget.style.color = '#38BDF8'; e.currentTarget.style.borderColor = 'rgba(56,189,248,0.3)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text3)'; e.currentTarget.style.borderColor = 'var(--border)'; }}>
                <Icon name="edit" size={13} />
              </button>
              <button onClick={() => setDeleteId(seller.id)} title="Excluir" style={{ width: 30, height: 30, borderRadius: 6, border: '1px solid var(--border)', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text3)', transition: 'all 0.15s' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(248,113,113,0.1)'; e.currentTarget.style.color = '#F87171'; e.currentTarget.style.borderColor = 'rgba(248,113,113,0.3)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text3)'; e.currentTarget.style.borderColor = 'var(--border)'; }}>
                <Icon name="trash" size={13} />
              </button>
            </div>
          </div>
        ))}
      </Card>

      {modal && <SellerModal seller={modal === 'new' ? null : modal} onSave={handleSave} onClose={() => setModal(null)} />}

      {deleteId && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(4px)' }} onClick={() => setDeleteId(null)} />
          <Card style={{ position: 'relative', maxWidth: 360, width: '100%', textAlign: 'center', zIndex: 1, padding: 28, border: '1px solid var(--border-strong)' }}>
            <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'rgba(248,113,113,0.1)', border: '1px solid rgba(248,113,113,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px' }}>
              <Icon name="trash" size={18} color="#F87171" />
            </div>
            <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 8, color: 'var(--text)' }}>Excluir Vendedor?</h3>
            <p style={{ color: 'var(--text2)', fontSize: 13, marginBottom: 20 }}>Esta ação não pode ser desfeita. O vendedor será removido permanentemente.</p>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
              <DarkBtn variant="outline" onClick={() => setDeleteId(null)}>Cancelar</DarkBtn>
              <DarkBtn danger onClick={() => handleDelete(deleteId)}>Excluir</DarkBtn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════
   ADMIN LAYOUT
══════════════════════════════════════════════ */
const AdminLayout = ({ sellers, setSellers, onLogout, initialTab = 'dashboard' }) => {
  const [tab, setTab] = useState(initialTab);

  useEffect(() => { setTab(initialTab); }, [initialTab]);

  const navItems = [
    { id: 'dashboard', icon: 'chart', label: 'Dashboard' },
    { id: 'sellers',   icon: 'users', label: 'Vendedores' },
  ];

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      {/* Sidebar */}
      <aside style={{
        width: 220, flexShrink: 0, background: 'var(--sidebar)',
        borderRight: '1px solid var(--border)',
        display: 'flex', flexDirection: 'column',
        position: 'fixed', top: 0, left: 0, bottom: 0, zIndex: 100,
        boxShadow: '1px 0 0 var(--border)',
      }}>
        {/* Logo */}
        <div style={{ height: 56, display: 'flex', alignItems: 'center', gap: 10, padding: '0 20px', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
          <div style={{ width: 30, height: 30, borderRadius: 8, background: 'linear-gradient(135deg,#22D3A0,#38BDF8)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <span style={{ color: '#0D0D0D', fontWeight: 800, fontSize: 15 }}>K</span>
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 13, color: 'var(--text)', lineHeight: 1.1 }}>Karis</div>
            <div style={{ fontSize: 10, color: 'var(--text3)', lineHeight: 1.1 }}>Soluções Inteligentes</div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{ flex: 1, padding: '12px 10px', display: 'flex', flexDirection: 'column', gap: 2 }}>
          {navItems.map(item => {
            const active = tab === item.id;
            return (
              <button key={item.id} onClick={() => setTab(item.id)} style={{
                display: 'flex', alignItems: 'center', gap: 11,
                width: '100%', padding: '9px 12px',
                borderRadius: 8, border: 'none', cursor: 'pointer',
                background: active ? 'var(--sidebar-active)' : 'transparent',
                color: active ? '#22D3A0' : 'var(--text2)',
                fontWeight: active ? 600 : 400,
                fontSize: 13, textAlign: 'left',
                position: 'relative',
                borderRight: active ? '3px solid #22D3A0' : '3px solid transparent',
                transition: 'all 0.15s',
              }}
              onMouseEnter={e => { if (!active) { e.currentTarget.style.background = 'var(--sidebar-hover)'; e.currentTarget.style.color = 'var(--text)'; } }}
              onMouseLeave={e => { if (!active) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text2)'; } }}
              >
                <Icon name={item.icon} size={17} color={active ? '#22D3A0' : 'var(--text3)'} />
                {item.label}
              </button>
            );
          })}
        </nav>

        {/* Bottom */}
        <div style={{ padding: '10px 10px 16px', borderTop: '1px solid var(--border)', display: 'flex', flexDirection: 'column', gap: 2 }}>
          <button onClick={onLogout} style={{
            display: 'flex', alignItems: 'center', gap: 11,
            width: '100%', padding: '9px 12px', borderRadius: 8,
            border: 'none', cursor: 'pointer', background: 'transparent',
            color: 'var(--text3)', fontSize: 13, fontWeight: 400, textAlign: 'left',
            transition: 'all 0.15s',
          }}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(248,113,113,0.08)'; e.currentTarget.style.color = '#F87171'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text3)'; }}>
            <Icon name="logout" size={16} color="currentColor" /> Sair
          </button>
        </div>
      </aside>

      {/* Main */}
      <div style={{ marginLeft: 220, flex: 1 }}>
        {/* Top bar */}
        <header style={{ height: 48, background: 'rgba(13,13,18,0.97)', backdropFilter: 'blur(12px)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', paddingLeft: 20, paddingRight: 20, gap: 8, position: 'sticky', top: 0, zIndex: 50 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 12, color: 'var(--text3)' }}>Árvore de Links</span>
            <span style={{ color: 'var(--text3)' }}>·</span>
            <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>{tab === 'dashboard' ? 'Dashboard' : 'Vendedores'}</span>
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
            <Badge label="Ativo" color="green" />
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingLeft: 10, borderLeft: '1px solid var(--border)' }}>
              <Avatar name="Admin" photoUrl="" size={26} />
              <span style={{ fontSize: 12, fontWeight: 500, color: 'var(--text2)' }}>Admin</span>
            </div>
          </div>
        </header>

        {/* Content */}
        <main style={{ padding: 24 }}>
          {/* Page title */}
          <div style={{ marginBottom: 20 }}>
            <h2 style={{ fontSize: 18, fontWeight: 700, color: 'var(--text)', marginBottom: 2 }}>
              {tab === 'dashboard' ? 'Dashboard' : 'Gerenciar Vendedores'}
            </h2>
            <p style={{ color: 'var(--text2)', fontSize: 13 }}>
              {tab === 'dashboard' ? 'Visão geral de desempenho da página' : 'Adicione, edite e organize sua equipe de vendas'}
            </p>
          </div>

          {tab === 'dashboard'
            ? <DashboardTab sellers={sellers} weekData={MOCK_WEEK} />
            : <SellersTab sellers={sellers} setSellers={setSellers} />
          }
        </main>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#22D3A0",
  "brandName": "Karis Soluções Inteligentes",
  "companyInitial": "K"
}/*EDITMODE-END*/;

const App = () => {
  const [screen, setScreen] = useState(() => localStorage.getItem('karis_screen') || 'public');
  const [sellers, setSellers] = useState(MOCK_SELLERS);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => { localStorage.setItem('karis_screen', screen); }, [screen]);

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    if (key === 'accentColor') document.documentElement.style.setProperty('--accent', val);
  };

  const demoScreens = [
    { id: 'public',    label: 'Página Pública' },
    { id: 'login',     label: 'Login Admin' },
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'sellers',   label: 'Vendedores' },
  ];

  return (
    <div>
      {/* Demo nav */}
      <div className="demo-nav">
        <span>Telas:</span>
        {demoScreens.map(s => (
          <button key={s.id} className={`demo-tab ${screen === s.id ? 'active' : ''}`} onClick={() => setScreen(s.id)}>{s.label}</button>
        ))}
      </div>

      <div style={{ paddingTop: screen === 'public' || screen === 'login' ? 40 : 0, paddingLeft: (screen === 'dashboard' || screen === 'sellers') ? 0 : 0 }}>
        {screen === 'public' && <PublicPage sellers={sellers.filter(s => s.active)} />}
        {screen === 'login' && <LoginPage onLogin={() => setScreen('dashboard')} />}
        {(screen === 'dashboard' || screen === 'sellers') && (
          <AdminLayout sellers={sellers} setSellers={setSellers} onLogout={() => setScreen('login')} initialTab={screen} />
        )}
      </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 10001, width: 260, background: 'var(--surface)', border: '1px solid var(--border-strong)', borderRadius: 12, padding: 16, boxShadow: 'var(--shadow-md)' }}>
          <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 14, color: 'var(--text)' }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div>
              <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>Cor de destaque</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {['#22D3A0','#38BDF8','#818CF8','#FBBF24','#F87171','#0ea5e9'].map(c => (
                  <button key={c} onClick={() => updateTweak('accentColor', c)} style={{ width: 24, height: 24, borderRadius: 6, background: c, border: tweaks.accentColor === c ? '2px solid #F0F0F0' : '2px solid transparent', cursor: 'pointer' }} />
                ))}
              </div>
            </div>
            <div>
              <label style={{ fontSize: 11, color: 'var(--text3)', display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>Nome da empresa</label>
              <input value={tweaks.brandName} onChange={e => updateTweak('brandName', e.target.value)} style={{ width: '100%', border: '1px solid var(--border)', borderRadius: 7, padding: '7px 10px', fontSize: 12, outline: 'none', color: 'var(--text)', background: '#22222C' }} />
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
